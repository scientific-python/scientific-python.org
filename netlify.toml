[build.environment]
  HUGO_VERSION = "0.152.2"
  DART_SASS_VERSION = "1.93.2"
  DART_SASS_URL = "https://github.com/sass/dart-sass/releases/download/"

[build]
  base = "/"
  publish = "public"
  command = """\
    export DART_SASS_TARBALL="dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" && \
    curl -LJO ${DART_SASS_URL}/${DART_SASS_VERSION}/${DART_SASS_TARBALL} && \
    tar -xf ${DART_SASS_TARBALL} && \
    rm ${DART_SASS_TARBALL} && \
    export PATH=/opt/build/repo/dart-sass:$PATH && \
    python -m venv .py3 && \
    source .py3/bin/activate && \
    make html && \
    LYCHEE_TAG=$(curl -s https://api.github.com/repos/lycheeverse/lychee/releases/latest | jq -r .tag_name) && \
    curl -LO "https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_TAG}/lychee-x86_64-unknown-linux-gnu.tar.gz" && \
    tar -xf lychee-x86_64-unknown-linux-gnu.tar.gz && \
    ./lychee-x86_64-unknown-linux-gnu/lychee \
      --no-progress \
      --root-dir public \
      --exclude 'fonts\\.gstatic\\.com' \
      --exclude 'fonts\\.googleapis\\.com' \
      --exclude 'cdn\\.jsdelivr\\.net' \
      --exclude 'cdnjs\\.cloudflare\\.com' \
      --exclude 'unpkg\\.com' \
      public/ \
    """
